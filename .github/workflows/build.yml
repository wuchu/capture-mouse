name: Build Windows x64

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - '.github/workflows/**'
      - '**.csproj'
      - '**.sln'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - '.github/workflows/**'
      - '**.csproj'
      - '**.sln'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore src/CaptureMouse/CaptureMouse.csproj
    
    - name: Build
      run: dotnet build src/CaptureMouse/CaptureMouse.csproj --configuration Release --no-restore
    
    - name: Publish x64
      shell: pwsh
      run: |
        dotnet publish src/CaptureMouse/CaptureMouse.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish/x64 `
          -p:PublishSingleFile=true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CaptureMouse-win-x64
        path: ./publish/x64/*.exe
    
    # Note: Release creation disabled due to permission issues
    # You can manually create a release and upload the artifact
